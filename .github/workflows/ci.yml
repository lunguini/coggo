name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Test cgo-free build path
        run: CGO_ENABLED=0 go test ./...

      - name: Check shell scripts
        run: |
          bash -n scripts/termux-deploy.sh
          bash -n scripts/termux-update.sh

      - name: Check script invariants
        run: go test ./scripts -count=1
